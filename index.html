<!DOCTYPE html>
<html lang="zh-CN">
<head>

          <a class="social-btn" href="https://space.bilibili.com/433677987" target="_blank" rel="noopener">

          <a class="social-btn" href="https://github.com/Yueosa" target="_blank" rel="noopener">

            <div class="icon"><i class="ri-mail-line"></i></div><span>Gmail</span>
          </a>
        </div>
      </div>

      <div class="aysm-inner">
        <div class="aysm-photo">
          <img src="assets/photo/placeholder.jpg" alt="photo" onerror="this.style.display='none'">

            <li>
              <i class="ri-genderless-line aysm-icon"></i>

            <li>
              <i class="ri-map-pin-line aysm-icon"></i>

            </li>

              <i class="ri-heart-line aysm-icon"></i>

            </div>
          </a>
          <a class="site-card" href="https://lol.yeastar.xin/" target="_blank" rel="noopener" data-index="5">
            <i class="ri-fire-line"></i>
            <div class="site-card-text">
              <span class="site-name">lol</span>
              <span class="site-desc">非常非常色色的页面!</span>
            </div>

        </div>

  <!-- Background music -->
  <audio id="bgm" src="assets/music/mainmusic.m4a" loop preload="auto"></audio>
