<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YukiKoi</title>
  <link rel="icon" href="https://q1.qlogo.cn/g?b=qq&amp;nk=1303028790&amp;s=640" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/loader.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/prologue.css">
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>

  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="loader-title">YukiKoi</div>
      <div class="loader-ecg">
        <svg viewBox="0 0 1000 200" preserveAspectRatio="none" aria-hidden="true">
          <path class="ecg-track" d="M0,100 H1000" />
          <path class="ecg-line ecg-blue" d="M0,100 H1000" />
          <path class="ecg-line ecg-pulse" d="M0,100 H300 L314,90 L326,118 L340,100 L352,100 L362,120 L374,6 L386,178 L396,150 L408,104 L420,100 L444,100 L462,88 L484,100 H760 L772,94 L784,114 L796,100 L808,100 L816,106 L826,78 L836,120 L846,100 H1000" />
        </svg>
      </div>
    </div>
  </div>

  <div class="bg" id="bg"></div>

  <nav class="nav">
    <button class="nav-btn" data-panel="asYouSeeMe">Projects</button>
    <button class="nav-btn active" data-panel="prologue">Prologue</button>
    <button class="nav-btn" data-panel="wander">Wander</button>
  </nav>

  <main class="panels">
    <section class="panel active" id="panel-prologue">
      <div class="prologue-inner">
        <div class="top">
          <img class="avatar" id="profileAvatar" alt="avatar">
          <div class="info" id="profileInfo"></div>
        </div>
        <div class="button-group" id="socialLinks"></div>
      </div>
    </section>

    <section class="panel" id="panel-asYouSeeMe">
      <div class="wander-inner">
        <div class="wander-head">
          <h2 class="wander-title" id="projectsTitle"></h2>
          <p class="wander-sub" id="projectsSub"></p>
        </div>
        <div class="wander-viewport">
          <div class="wander-track" id="projectsTrack"></div>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-wander">
      <div class="wander-inner">
        <div class="wander-head">
          <h2 class="wander-title" id="wanderTitle"></h2>
          <p class="wander-sub" id="wanderSub"></p>
        </div>
        <div class="wander-viewport">
          <div class="wander-track" id="wanderTrack"></div>
        </div>
      </div>
    </section>
  </main>

  <button class="page-arrow page-arrow-left" id="arrowPrev" aria-label="上一页"></button>
  <button class="page-arrow page-arrow-right" id="arrowNext" aria-label="下一页"></button>

  <audio id="bgm" loop preload="auto"></audio>

  <script src="js/config.js"></script>
  <script src="js/render.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
